<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas — Gestão de Estoque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="main-content" role="main">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button id="sidebar-toggle-btn" class="sidebar-toggle" aria-label="Abrir menu">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div>
                    <h1 class="page-title">Sistemas</h1>
                    <p class="page-subtitle">Cada sistema é um estoque isolado, com seu admin e equipe</p>
                </div>
            </div>
            <button id="btn-novo-sistema" class="btn btn-primary" aria-label="Criar novo sistema">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
                Novo sistema
            </button>
        </header>

        <!-- Content -->
        <div class="page-body">
            <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;">
                <span id="table-info" class="t-label"></span>
            </div>

            <div class="table-container rise rise-1" style="overflow-x:auto;">
                <table class="data-table" aria-label="Lista de sistemas">
                    <thead>
                        <tr>
                            <th>Sistema</th>
                            <th>Código (login)</th>
                            <th>Administrador</th>
                            <th style="text-align:right;">Usuários</th>
                            <th style="text-align:right;">Produtos</th>
                            <th>Criado em</th>
                            <th style="width:60px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="sistemas-tbody"><!-- Loaded by JS --></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Novo Sistema -->
    <div id="modal-sistema" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Novo sistema</h2>
                <button id="modal-close" class="btn-icon" aria-label="Fechar modal">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form id="form-sistema" novalidate>
                <div class="modal-body">
                    <p class="t-label" style="margin:0 0 0.75rem;">Dados do sistema</p>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                        <div>
                            <label for="field-nome" class="form-label">Nome <span class="req" aria-hidden="true">*</span></label>
                            <input type="text" id="field-nome" class="form-input" placeholder="Ex.: Loja da Maria" required>
                        </div>
                        <div>
                            <label for="field-codigo" class="form-label">Código <span class="req" aria-hidden="true">*</span></label>
                            <input type="text" id="field-codigo" class="form-input t-mono" placeholder="loja-maria" autocapitalize="none" spellcheck="false" required>
                            <p class="form-hint">Usado no login. Só letras minúsculas, números e hífen.</p>
                        </div>
                    </div>

                    <hr class="divider">

                    <p class="t-label" style="margin:0 0 0.75rem;">Administrador do sistema</p>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                        <div>
                            <label for="field-admin-nome" class="form-label">Nome <span class="req" aria-hidden="true">*</span></label>
                            <input type="text" id="field-admin-nome" class="form-input" placeholder="Maria Silva" required>
                        </div>
                        <div>
                            <label for="field-admin-username" class="form-label">Usuário <span class="req" aria-hidden="true">*</span></label>
                            <input type="text" id="field-admin-username" class="form-input t-mono" placeholder="maria" autocapitalize="none" spellcheck="false" required>
                        </div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                        <div>
                            <label for="field-admin-senha" class="form-label">Senha <span class="req" aria-hidden="true">*</span></label>
                            <input type="text" id="field-admin-senha" class="form-input" placeholder="mín. 4 caracteres" required>
                        </div>
                        <div>
                            <label for="field-admin-email" class="form-label">E-mail <span class="opt">(opcional)</span></label>
                            <input type="email" id="field-admin-email" class="form-input" placeholder="maria@email.com">
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" id="btn-save" class="btn btn-primary">Criar sistema</button>
                </div>
            </form>
        </div>
    </div>

    <script>window.ACTIVE_NAV = 'sistemas';</script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/sistemas.js"></script>
</body>
</html>
