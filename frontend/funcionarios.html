<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipe — Gestão de Estoque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="main-content" role="main">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button id="sidebar-toggle-btn" class="sidebar-toggle" aria-label="Abrir menu">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div>
                    <h1 class="page-title">Equipe</h1>
                    <p class="page-subtitle">Operadores do sistema e desempenho em movimentações</p>
                </div>
            </div>
            <button id="btn-novo-operador" class="btn btn-primary" aria-label="Criar novo operador">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
                Novo operador
            </button>
        </header>

        <!-- Content -->
        <div class="page-body">

            <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;">
                <span id="table-info" class="t-label"></span>
            </div>

            <!-- Tabela -->
            <div class="table-container rise rise-1" style="overflow-x:auto;">
                <table class="data-table" aria-label="Equipe do sistema">
                    <thead>
                        <tr>
                            <th>Funcionário</th>
                            <th>Papel</th>
                            <th style="text-align:right;">Vendeu (unid.)</th>
                            <th style="text-align:right;">Faturou</th>
                            <th style="text-align:right;">Movimentações</th>
                            <th>Última atividade</th>
                            <th style="width:60px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="equipe-tbody">
                        <!-- Loaded by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Novo Operador -->
    <div id="modal-operador" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Novo operador</h2>
                <button id="modal-close" class="btn-icon" aria-label="Fechar modal">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form id="form-operador" novalidate>
                <div class="modal-body">
                    <div style="margin-bottom:1rem;">
                        <label for="field-nome" class="form-label">Nome <span class="req" aria-hidden="true">*</span></label>
                        <input type="text" id="field-nome" class="form-input" placeholder="Ex.: Eduardo" required>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                        <div>
                            <label for="field-username" class="form-label">Usuário <span class="req" aria-hidden="true">*</span></label>
                            <input type="text" id="field-username" class="form-input t-mono" placeholder="eduardo" autocapitalize="none" spellcheck="false" required>
                            <p class="form-hint">Login do operador neste sistema.</p>
                        </div>
                        <div>
                            <label for="field-senha" class="form-label">Senha <span class="req" aria-hidden="true">*</span></label>
                            <input type="text" id="field-senha" class="form-input" placeholder="mín. 4 caracteres" required>
                        </div>
                    </div>
                    <div class="alert alert-yellow" style="margin-top:1rem;">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                        </svg>
                        <span>O operador entra com o <strong>código deste sistema</strong> + usuário + senha.</span>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" id="btn-save" class="btn btn-primary">Criar operador</button>
                </div>
            </form>
        </div>
    </div>

    <script>window.ACTIVE_NAV = 'funcionarios';</script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/funcionarios.js"></script>
</body>
</html>
