<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos — Gestão de Estoque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="main-content" role="main">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button id="sidebar-toggle-btn" class="sidebar-toggle" aria-label="Abrir menu">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div>
                    <h1 class="page-title">Produtos</h1>
                    <p class="page-subtitle">Catálogo do estoque</p>
                </div>
            </div>
            <button id="btn-novo-produto" class="btn btn-primary" style="display:none;" aria-label="Cadastrar novo produto">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
                Novo produto
            </button>
        </header>

        <!-- Content -->
        <div class="page-body">

            <!-- Filtros -->
            <div class="rise" style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;">
                <div class="input-group" style="flex:1;min-width:200px;max-width:360px;">
                    <span class="input-icon">
                        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
                        </svg>
                    </span>
                    <input
                        type="search"
                        id="search-input"
                        class="form-input"
                        placeholder="Buscar por nome ou SKU..."
                        aria-label="Buscar produtos"
                    >
                </div>
                <select id="filter-categoria" class="form-input" style="width:auto;min-width:180px;" aria-label="Filtrar por categoria">
                    <option value="">Todas as categorias</option>
                </select>
                <span id="table-info" class="t-label" style="margin-left:auto;"></span>
            </div>

            <!-- Tabela -->
            <div class="table-container rise rise-1">
                <table class="data-table" aria-label="Lista de produtos">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>SKU</th>
                            <th>Categoria</th>
                            <th>Estoque</th>
                            <th>Preço venda</th>
                            <th style="width:80px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="produtos-tbody">
                        <!-- Loaded by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Paginação -->
            <div style="display:flex;justify-content:center;margin-top:1.25rem;">
                <div class="pagination" id="pagination" role="navigation" aria-label="Paginação"></div>
            </div>
        </div>
    </div>

    <!-- Modal Produto -->
    <div id="modal-produto" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Produto</h2>
                <button id="modal-close" class="btn-icon" aria-label="Fechar modal">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form id="form-produto" novalidate>
                <div class="modal-body">
                    <!-- Nome + SKU -->
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                        <div>
                            <label for="field-nome" class="form-label">Nome <span class="req" aria-hidden="true">*</span></label>
                            <input type="text" id="field-nome" class="form-input" placeholder="Nome do produto" required>
                        </div>
                        <div>
                            <label for="field-sku" class="form-label">SKU <span class="req" aria-hidden="true">*</span></label>
                            <input type="text" id="field-sku" class="form-input t-mono" placeholder="EX-001" required>
                        </div>
                    </div>

                    <!-- Preços -->
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                        <div>
                            <label for="field-preco-custo" class="form-label">Preço de custo (R$)</label>
                            <input type="number" id="field-preco-custo" class="form-input" placeholder="0,00" min="0" step="0.01">
                        </div>
                        <div>
                            <label for="field-preco-venda" class="form-label">Preço de venda (R$)</label>
                            <input type="number" id="field-preco-venda" class="form-input" placeholder="0,00" min="0" step="0.01">
                        </div>
                    </div>

                    <!-- Qtd mínima -->
                    <div style="margin-bottom:1rem;">
                        <label for="field-qtd-minima" class="form-label">Quantidade mínima</label>
                        <input type="number" id="field-qtd-minima" class="form-input" placeholder="5" min="0" style="max-width:160px;">
                        <p class="form-hint">Alerta de estoque baixo abaixo deste valor.</p>
                    </div>

                    <hr class="divider">

                    <!-- Categoria + Fornecedor -->
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                        <div>
                            <label for="field-categoria" class="form-label">Categoria <span class="req" aria-hidden="true">*</span></label>
                            <select id="field-categoria" class="form-input" required>
                                <option value="">Selecione uma categoria</option>
                            </select>
                        </div>
                        <div>
                            <label for="field-fornecedor" class="form-label">Fornecedor</label>
                            <select id="field-fornecedor" class="form-input">
                                <option value="">Nenhum</option>
                            </select>
                        </div>
                    </div>

                    <!-- Imagem URL -->
                    <div>
                        <label for="field-imagem" class="form-label">URL da imagem</label>
                        <input type="url" id="field-imagem" class="form-input" placeholder="https://...">
                    </div>

                    <div class="alert alert-yellow" style="margin-top:1rem;">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                        </svg>
                        <span>A quantidade em estoque é controlada exclusivamente por <strong>Movimentações</strong>.</span>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" id="btn-save" class="btn btn-primary">Salvar produto</button>
                </div>
            </form>
        </div>
    </div>

    <script>window.ACTIVE_NAV = 'produtos';</script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/produtos.js"></script>
</body>
</html>
