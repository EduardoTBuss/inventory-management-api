<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias — Gestão de Estoque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="main-content" role="main">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button id="sidebar-toggle-btn" class="sidebar-toggle" aria-label="Abrir menu">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div>
                    <h1 class="page-title">Categorias</h1>
                    <p class="page-subtitle">Organização dos produtos</p>
                </div>
            </div>
            <button id="btn-nova-categoria" class="btn btn-primary" style="display:none;" aria-label="Criar nova categoria">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
                Nova categoria
            </button>
        </header>

        <div class="page-body">

            <div class="rise" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
                <span id="cat-count" class="t-label"></span>
            </div>

            <!-- Tabela -->
            <div class="table-container rise rise-1" style="max-width:800px;">
                <table class="data-table" aria-label="Lista de categorias">
                    <thead>
                        <tr>
                            <th style="width:40%">Nome</th>
                            <th>Descrição</th>
                            <th style="width:100px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="cat-tbody">
                        <!-- Loaded by JS -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Modal Categoria -->
    <div id="modal-categoria" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-box" style="max-width:440px;">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Categoria</h2>
                <button id="modal-close" class="btn-icon" aria-label="Fechar modal">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form id="form-categoria" novalidate>
                <div class="modal-body">
                    <div style="margin-bottom:1rem;">
                        <label for="field-nome" class="form-label">Nome <span class="req" aria-hidden="true">*</span></label>
                        <input
                            type="text"
                            id="field-nome"
                            class="form-input"
                            placeholder="Ex: Eletrônicos"
                            required
                            autocomplete="off"
                        >
                    </div>

                    <div>
                        <label for="field-descricao" class="form-label">Descrição <span class="opt">(opcional)</span></label>
                        <textarea
                            id="field-descricao"
                            class="form-input"
                            placeholder="Descreva brevemente esta categoria..."
                            rows="3"
                            style="resize:vertical;"
                        ></textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" id="btn-save" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>window.ACTIVE_NAV = 'categorias';</script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/categorias.js"></script>
</body>
</html>
